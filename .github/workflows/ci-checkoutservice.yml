name: CI — checkoutservice

on:
  push:
    branches: [main]
    paths:
      - 'src/checkoutservice/**'
      - 'apps/checkoutservice/**'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/ci-service.yml
    with:
      service_name: checkoutservice
      service_path: ./src/checkoutservice
    secrets: inherit