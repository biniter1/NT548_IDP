apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-microservice
  title: New Microservice
  description: Create a new microservice — repo, CI, K8s namespace, ArgoCD, all in one click
  tags:
    - recommended
    - microservice
    - golden-path
spec:
  owner: devops-team
  type: service

  parameters:
    - title: Service Information
      required:
        - serviceName
        - description
        - owner
      properties:
        serviceName:
          title: Service Name
          type: string
          description: Lowercase only, no spaces (e.g. orderservice)
          pattern: "^[a-z][a-z0-9-]*$"
          ui:autofocus: true
        description:
          title: Description
          type: string
        owner:
          title: Team Owner
          type: string
          default: devops-team
        language:
          title: Language
          type: string
          enum: [go, python, nodejs]
          default: go
        port:
          title: Service Port
          type: number
          default: 8080

    - title: Resource Configuration
      properties:
        cpuRequest:
          title: CPU Request
          type: string
          default: "100m"
        memoryRequest:
          title: Memory Request
          type: string
          default: "128Mi"
        cpuLimit:
          title: CPU Limit
          type: string
          default: "200m"
        memoryLimit:
          title: Memory Limit
          type: string
          default: "256Mi"
        replicas:
          title: Initial Replicas
          type: number
          default: 1

    - title: GitHub Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - biniter1

  steps:
    # ── Step 1: Render skeleton → workspace ──
    - id: fetch-template
      name: "📁 Copy boilerplate files"
      action: fetch:template
      input:
        url: https://github.com/biniter1/NT548_IDP/tree/main/templates/new-service/skeleton
        values:
          serviceName: ${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          language: ${{ parameters.language }}
          port: ${{ parameters.port }}
          cpuRequest: ${{ parameters.cpuRequest }}
          memoryRequest: ${{ parameters.memoryRequest }}
          cpuLimit: ${{ parameters.cpuLimit }}
          memoryLimit: ${{ parameters.memoryLimit }}
          replicas: ${{ parameters.replicas }}
    - id: fetch-helm
      name: "⎈ Copy Helm chart"
      action: fetch:plain
      input:
        url: https://github.com/biniter1/NT548_IDP/tree/main/templates/new-service/helm-chart
        targetPath: ./helm
    # ── Step 2: Push workspace → GitHub repo ─
    - id: publish
      name: "🐙 Create GitHub repository"
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: public
        topics:
          - microservice
          - online-boutique
          - ${{ parameters.language }}

    # ── Step 3: Render ArgoCD Application manifest ──
    - id: create-argocd-manifest
      name: "🔄 Generate ArgoCD manifest"
      action: fetch:template
      input:
        url: https://github.com/biniter1/NT548_IDP/tree/main/templates/new-service/argocd-templates/
        targetPath: ./argocd-output
        values:
          serviceName: ${{ parameters.serviceName }}
          owner: ${{ parameters.owner }}
          port: ${{ parameters.port }}
          cpuRequest: ${{ parameters.cpuRequest }}
          memoryRequest: ${{ parameters.memoryRequest }}
          cpuLimit: ${{ parameters.cpuLimit }}
          memoryLimit: ${{ parameters.memoryLimit }}
          replicas: ${{ parameters.replicas }}

    # ── Step 4: PR ArgoCD Application → gitops repo ──
    - id: create-argocd-app
      name: "🔄 Create ArgoCD Application PR"
      action: publish:github:pull-request
      input:
        repoUrl: "github.com?repo=NT548_IDP&owner=biniter1"
        title: "feat: add ArgoCD app for ${{ parameters.serviceName }}"
        branchName: "feat/argocd-${{ parameters.serviceName }}"
        description: |
          Auto-generated ArgoCD Application for **${{ parameters.serviceName }}**.

          - Source repo: `https://github.com/biniter1/${{ parameters.serviceName }}`
          - Target namespace: `${{ parameters.serviceName }}`
          - Helm chart path: `helm/`
        sourcePath: ./argocd-output
        targetPath: gitops/apps

    # ── Step 5: Register in Backstage catalog ──
    - id: register
      name: "📋 Register in Software Catalog"
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: "🐙 GitHub Repository"
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: "📋 View in Catalog"
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
    text:
      - title: "✅ Service created — next steps"
        content: |
          **${{ parameters.serviceName }}** is ready!

          **Done automatically:**
          - GitHub repo with boilerplate, Dockerfile, Helm chart, and CI pipeline
          - K8s namespace manifest at `k8s/namespace.yaml` in the repo
          - ArgoCD Application PR opened → review and merge

          **Required manual steps:**
          1. Add these GitHub Secrets to the new repo:
             - `KUBECONFIG_B64` — base64 kubeconfig: `cat ~/.kube/config | base64`
             - `ARGOCD_TOKEN` — ArgoCD API token (optional, for auto-registration)
             - `ARGOCD_SERVER` — ArgoCD URL, e.g. `https://argocd.example.com`
          2. Run **Actions → Setup** workflow to create the K8s namespace
          3. Merge the ArgoCD Application PR in NT548_IDP
          4. Push code → CI builds Docker image → ArgoCD deploys automatically
