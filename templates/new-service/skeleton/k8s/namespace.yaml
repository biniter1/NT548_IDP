apiVersion: v1
kind: Namespace
metadata:
  name: ${{ values.serviceName }}
  labels:
    app.kubernetes.io/managed-by: backstage
    owner: ${{ values.owner }}
    backstage.io/kubernetes-id: ${{ values.serviceName }}
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ${{ values.serviceName }}-quota
  namespace: ${{ values.serviceName }}
spec:
  hard:
    requests.cpu: "${{ values.cpuLimit }}"
    requests.memory: "${{ values.memoryLimit }}"
    limits.cpu: "${{ values.cpuLimit }}"
    limits.memory: "${{ values.memoryLimit }}"
    pods: "10"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${{ values.serviceName }}
  namespace: ${{ values.serviceName }}
  labels:
    app: ${{ values.serviceName }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${{ values.serviceName }}-role
  namespace: ${{ values.serviceName }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${{ values.serviceName }}-rolebinding
  namespace: ${{ values.serviceName }}
subjects:
  - kind: ServiceAccount
    name: ${{ values.serviceName }}
    namespace: ${{ values.serviceName }}
roleRef:
  kind: Role
  name: ${{ values.serviceName }}-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ${{ values.serviceName }}-limits
  namespace: ${{ values.serviceName }}
spec:
  limits:
    - type: Container
      default:
        cpu: "${{ values.cpuLimit }}"
        memory: "${{ values.memoryLimit }}"
      defaultRequest:
        cpu: "${{ values.cpuRequest }}"
        memory: "${{ values.memoryRequest }}"
