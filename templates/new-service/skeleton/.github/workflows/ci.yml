name: CI - ${{ values.serviceName }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/biniter1/${{ values.serviceName }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: {% raw %}${{ github.actor }}{% endraw %}
          password: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: {% raw %}${{ github.ref == 'refs/heads/main' }}{% endraw %}
          tags: |
            {% raw %}${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest{% endraw %}
