apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: serviceb
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: backstage
    owner: devops-team
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    backstage.io/managed-by-location: "url:https://github.com/biniter1/serviceb"
spec:
  project: default
  source:
    repoURL: https://github.com/biniter1/serviceb.git
    targetRevision: main
    path: helm
    helm:
      values: |
        image:
          repository: ghcr.io/biniter1/serviceb
          tag: latest
        service:
          port: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        replicaCount: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: serviceb
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
